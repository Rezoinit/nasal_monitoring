<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" width="260" height="72">
  <!-- Oval-rect shape: rx=20 gives rounded corners without being a full pill -->
  <rect width="260" height="72" rx="20" fill="#1D6BF3"/>
  <!-- Subtle inner highlight for depth -->
  <rect x="1" y="1" width="258" height="35" rx="19" fill="white" opacity="0.06"/>
  <!-- Button text -->
  <text
    x="130"
    y="46"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="600"
    fill="white"
    text-anchor="middle"
    letter-spacing="0.8"
  >⚙  Calibrate</text>
</svg>
